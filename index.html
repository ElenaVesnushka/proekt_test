<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Погода — день и настроение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
</head>
<body data-season="spring" data-month="1">
  <main class="wrap">
    <section class="card hero-card">
      <h1>Погода и день</h1>
      <p id="currentDate" class="date-text"></p>

      <div class="controls">
        <input id="cityInput" list="cityList" placeholder="Город, например Москва" value="Москва" autocomplete="address-level2">
        <input id="dateInput" class="date-input" type="date" aria-label="Дата для прогноза и настроения" title="Дата">
        <select id="seasonSelect" class="season-select" aria-label="Тема оформления">
          <option value="auto">Тема: по месяцу даты</option>
          <option value="spring">Весна</option>
          <option value="summer">Лето</option>
          <option value="autumn">Осень</option>
          <option value="winter">Зима</option>
        </select>
        <button id="loadBtn" type="button">Обновить прогноз</button>
      </div>
      <datalist id="cityList">
        <option value="Москва"></option>
        <option value="Санкт-Петербург"></option>
        <option value="Казань"></option>
        <option value="Новосибирск"></option>
        <option value="Екатеринбург"></option>
        <option value="Минск"></option>
        <option value="Алматы"></option>
      </datalist>

      <p id="status" class="status"></p>

      <p id="weatherSummary" class="weather-summary" aria-live="polite"></p>

      <div class="panels-grid">
        <article class="panel card">
          <h2>Погода</h2>
          <p id="cityLabel">Город: —</p>
          <div id="weatherBox"></div>
          <p class="footer-note">Прогноз: Open-Meteo. Сегодня — оперативный прогноз; прошлые дни — архив reanalysis.</p>
        </article>

        <article class="panel card">
          <h2>Настроение дня</h2>
          <p id="dayMoodText" class="flow-text">…</p>
          <p class="footer-note">Без знаков зодиака — общий совет и ритм дня.</p>
        </article>

        <article class="panel card">
          <h2>Праздник / памятная дата</h2>
          <p id="holidayText" class="flow-text holiday-title">…</p>
          <p id="holidayMeta" class="holiday-tier" hidden></p>
          <p id="holidayNote" class="holiday-note flow-text"></p>
          <p id="holidayExtras" class="holiday-extras" hidden></p>
        </article>

        <article class="panel card reminder-strip" id="reminderBlock" aria-live="polite">
          <h2>Шуточно-заботливое напоминание</h2>
          <p id="reminderText" class="flow-text reminder-body">…</p>
        </article>
      </div>
    </section>
  </main>

  <a class="fab-archive" href="archive.html">
    <span class="icon" aria-hidden="true">◎</span>
    Архив погоды
  </a>

  <script src="js/calendar-data.js"></script>
  <script src="js/weather-reminders.js"></script>
  <script src="js/weather-app.js"></script>
</body>
</html>
