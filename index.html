<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Погода на сегодня и завтра</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #eef9f1;
      --bg-soft: #e3f1ff;
      --card: #fffdf6;
      --text: #203238;
      --muted: #53707c;
      --accent: #ff8f6b;
      --accent-2: #ff7043;
      --border: #cde5d4;
      --shadow: 0 10px 30px rgba(45, 83, 73, 0.14);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101b1a;
        --bg-soft: #1a2837;
        --card: #162425;
        --text: #e8f8ed;
        --muted: #a8c5b8;
        --accent: #ffb088;
        --accent-2: #ff9972;
        --border: #2f4a46;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
    }

    body[data-season="spring"] {
      --bg: #eef9f1;
      --bg-soft: #e3f1ff;
      --card: #fffdf6;
      --text: #203238;
      --muted: #53707c;
      --accent: #ff8f6b;
      --accent-2: #ff7043;
      --border: #cde5d4;
    }

    body[data-season="summer"] {
      --bg: #ecfbff;
      --bg-soft: #dff9df;
      --card: #fffcf0;
      --text: #1c2f35;
      --muted: #4f6e73;
      --accent: #ffad33;
      --accent-2: #ff9800;
      --border: #cbe7e1;
    }

    body[data-season="autumn"] {
      --bg: #fff3e7;
      --bg-soft: #ffe4cf;
      --card: #fffaf5;
      --text: #3a2c21;
      --muted: #7a5f49;
      --accent: #f08a24;
      --accent-2: #db6e00;
      --border: #f1d3b4;
    }

    body[data-season="winter"] {
      --bg: #eaf2ff;
      --bg-soft: #dce8f7;
      --card: #f7fbff;
      --text: #1f2d45;
      --muted: #597191;
      --accent: #6da9ff;
      --accent-2: #3e8cff;
      --border: #c8d9ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--bg), var(--bg-soft) 55%, #fff3cf 120%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 16px 36px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.6rem, 3vw, 2rem);
    }

    .date-text {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .season-select {
      min-width: 170px;
    }

    input, button, select {
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      outline: none;
    }

    input:focus, button:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(75, 123, 236, 0.16);
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--accent-2);
    }

    .status {
      min-height: 1.4em;
      color: var(--muted);
      margin: 0;
    }

    .grid {
      margin-top: 18px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      color: var(--accent-2);
    }

    .panel p {
      margin: 0.35rem 0;
      line-height: 1.45;
    }

    .weather-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 7px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .season-art {
      width: 100%;
      height: 170px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.2));
      overflow: hidden;
    }

    .season-art .branch-sway {
      transform-origin: 22px 142px;
      animation: branchSway 7s ease-in-out infinite;
    }

    .season-art .decor-group {
      transform-origin: 230px 68px;
      animation: decorBreathe 5.5s ease-in-out infinite;
    }

    .season-art .decor-group.decor-snow {
      animation-name: snowShimmer;
      transform-origin: 240px 68px;
    }

    @keyframes branchSway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(0.65deg); }
    }

    @keyframes decorBreathe {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-2.5px) rotate(0.35deg); }
    }

    @keyframes snowShimmer {
      0%, 100% { transform: translateY(0); opacity: 0.92; }
      50% { transform: translateY(1.5px); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .season-art .branch-sway,
      .season-art .decor-group {
        animation: none !important;
      }
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-season="spring">
  <main class="wrap">
    <section class="card">
      <h1>Прогноз погоды на сегодня и завтра</h1>
      <p id="currentDate" class="date-text"></p>

      <div class="controls">
        <input id="cityInput" list="cityList" placeholder="Введите город, например Москва" value="Москва">
        <select id="seasonSelect" class="season-select" aria-label="Тема сезона">
          <option value="auto">Тема: авто</option>
          <option value="spring">Весна</option>
          <option value="summer">Лето</option>
          <option value="autumn">Осень</option>
          <option value="winter">Зима</option>
        </select>
        <button id="loadBtn" type="button">Показать прогноз</button>
      </div>
      <datalist id="cityList">
        <option value="Москва"></option>
        <option value="Санкт-Петербург"></option>
        <option value="Казань"></option>
        <option value="Новосибирск"></option>
        <option value="Екатеринбург"></option>
        <option value="Минск"></option>
        <option value="Алматы"></option>
      </datalist>

      <p id="status" class="status"></p>

      <div class="grid">
        <article class="panel card">
          <h2>Погода</h2>
          <p id="cityLabel">Город: -</p>
          <div id="weatherBox"></div>
          <p class="footer-note">Источник данных: Open-Meteo (реальный API).</p>
        </article>

        <article class="panel card">
          <h2>Краткий гороскоп</h2>
          <p id="horoscopeText">Загрузка...</p>
        </article>

        <article class="panel card">
          <h2>Праздник или памятная дата</h2>
          <p id="holidayText">Загрузка...</p>
        </article>

        <article class="panel card">
          <h2>Шуточное, но заботливое напоминание</h2>
          <p id="reminderText">Сейчас подберу совет по погоде...</p>
        </article>

        <article class="panel card">
          <h2>Ветка сезона</h2>
          <p id="seasonLabel">Подбираю иллюстрацию по времени года...</p>
          <svg id="seasonBranch" class="season-art" viewBox="0 0 400 180" role="img" aria-label="Иллюстрация ветки дерева"></svg>
        </article>
      </div>
    </section>
  </main>

  <script>
    const dateEl = document.getElementById("currentDate");
    const cityInput = document.getElementById("cityInput");
    const loadBtn = document.getElementById("loadBtn");
    const seasonSelect = document.getElementById("seasonSelect");
    const statusEl = document.getElementById("status");
    const cityLabel = document.getElementById("cityLabel");
    const weatherBox = document.getElementById("weatherBox");
    const horoscopeText = document.getElementById("horoscopeText");
    const holidayText = document.getElementById("holidayText");
    const reminderText = document.getElementById("reminderText");
    const seasonLabel = document.getElementById("seasonLabel");
    const seasonBranch = document.getElementById("seasonBranch");

    const formatter = new Intl.DateTimeFormat("ru-RU", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    const today = new Date();
    dateEl.textContent = "Сегодня: " + formatter.format(today);

    const seasonNames = {
      spring: "Весна",
      summer: "Лето",
      autumn: "Осень",
      winter: "Зима"
    };

    const dailyHoroscope = [
      "День подходит для спокойного планирования и небольших, но уверенных шагов вперед.",
      "Хорошее время для общения: короткий разговор сегодня может принести полезную идею завтра.",
      "Сфокусируйтесь на главном и не перегружайте себя лишними задачами, так результат будет лучше.",
      "Полезно завершить давние мелкие дела: они освободят место для новых возможностей.",
      "День благоприятен для обучения и новых знаний, особенно в практических вопросах.",
      "Поддержка близких и позитивный настрой помогут быстрее решить текущие вопросы.",
      "Стоит немного замедлиться, восстановить силы и наметить приоритеты на следующую неделю."
    ];

    horoscopeText.textContent = dailyHoroscope[today.getDay() === 0 ? 6 : today.getDay() - 1];

    const memorableDates = {
      "01-01": "Новый год",
      "01-07": "Рождество Христово (православное)",
      "02-23": "День защитника Отечества",
      "03-08": "Международный женский день",
      "04-12": "День космонавтики",
      "05-01": "Праздник Весны и Труда",
      "05-09": "День Победы",
      "06-12": "День России",
      "11-04": "День народного единства",
      "12-31": "Канун Нового года"
    };

    function weatherCodeToText(code) {
      const map = {
        0: "Ясно",
        1: "Преимущественно ясно",
        2: "Переменная облачность",
        3: "Пасмурно",
        45: "Туман",
        48: "Туман с инеем",
        51: "Слабая морось",
        53: "Морось",
        55: "Сильная морось",
        61: "Слабый дождь",
        63: "Дождь",
        65: "Сильный дождь",
        71: "Слабый снег",
        73: "Снег",
        75: "Сильный снег",
        80: "Ливневый дождь",
        95: "Гроза"
      };
      return map[code] ?? "Неизвестно";
    }

    function formatISODate(isoDate) {
      return new Intl.DateTimeFormat("ru-RU", {
        weekday: "short",
        day: "numeric",
        month: "short"
      }).format(new Date(isoDate));
    }

    function getSeasonByMonth(monthIndex) {
      if (monthIndex >= 2 && monthIndex <= 4) return "spring";
      if (monthIndex >= 5 && monthIndex <= 7) return "summer";
      if (monthIndex >= 8 && monthIndex <= 10) return "autumn";
      return "winter";
    }

    function sakuraFlower(x, y, scale) {
      const s = scale;
      return (
        "<g transform=\"translate(" + x + "," + y + ") scale(" + s + ")\">" +
        "<g fill=\"#ffb8d0\">" +
        "<ellipse cx=\"0\" cy=\"-7\" rx=\"3.4\" ry=\"6.8\" />" +
        "<ellipse cx=\"0\" cy=\"-7\" rx=\"3.4\" ry=\"6.8\" transform=\"rotate(72)\" />" +
        "<ellipse cx=\"0\" cy=\"-7\" rx=\"3.4\" ry=\"6.8\" transform=\"rotate(144)\" />" +
        "<ellipse cx=\"0\" cy=\"-7\" rx=\"3.4\" ry=\"6.8\" transform=\"rotate(216)\" />" +
        "<ellipse cx=\"0\" cy=\"-7\" rx=\"3.4\" ry=\"6.8\" transform=\"rotate(288)\" />" +
        "</g>" +
        "<circle r=\"3\" fill=\"#fff5f9\" />" +
        "</g>"
      );
    }

    function sakuraBud(x, y) {
      return (
        "<ellipse cx=\"" + x + "\" cy=\"" + y + "\" rx=\"4\" ry=\"6\" fill=\"#ff9ec4\" transform=\"rotate(-25 " + x + " " + y + ")\" />"
      );
    }

    function cherryLeaf(x, y, rot) {
      return (
        "<g transform=\"translate(" + x + "," + y + ") rotate(" + rot + ")\">" +
        "<ellipse cx=\"0\" cy=\"0\" rx=\"14\" ry=\"8\" fill=\"#4a9f4a\" />" +
        "<path d=\"M 0 -8 Q 0 0 0 10\" stroke=\"#2d6b2d\" stroke-width=\"1.2\" fill=\"none\" />" +
        "</g>"
      );
    }

    function cherryPair(x, y) {
      return (
        "<g transform=\"translate(" + x + "," + y + ")\">" +
        "<path d=\"M 0 -4 Q 3 -14 10 -10\" stroke=\"#5c4033\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\" />" +
        "<ellipse cx=\"2\" cy=\"2\" rx=\"5.5\" ry=\"6.5\" fill=\"#c41e3a\" />" +
        "<ellipse cx=\"11\" cy=\"5\" rx=\"5.5\" ry=\"6.5\" fill=\"#a01830\" />" +
        "<ellipse cx=\"2\" cy=\"2\" rx=\"2\" ry=\"2.5\" fill=\"#ff6b7a\" opacity=\"0.35\" />" +
        "</g>"
      );
    }

    function mapleLeafPath(fill) {
      return (
        "<path d=\"M 0 10 L 4 -2 L 12 -8 L 10 2 L 16 8 L 6 10 L 0 18 L -6 10 L -16 8 L -10 2 L -12 -8 L -4 -2 Z\" fill=\"" +
        fill +
        "\" stroke=\"#8a3a12\" stroke-width=\"0.4\" stroke-linejoin=\"round\" />"
      );
    }

    function mapleLeaf(x, y, rot, scale, fill) {
      return (
        "<g transform=\"translate(" + x + "," + y + ") rotate(" + rot + ") scale(" + scale + ")\">" +
        mapleLeafPath(fill) +
        "<path d=\"M 0 10 L 0 22\" stroke=\"#5a3010\" stroke-width=\"1.2\" />" +
        "</g>"
      );
    }

    function spruceNeedle(x, y, ang, len) {
      const rad = (ang * Math.PI) / 180;
      const x2 = x + Math.cos(rad) * len;
      const y2 = y + Math.sin(rad) * len;
      return (
        "<polygon points=\"" +
        x +
        "," +
        y +
        " " +
        x2 +
        "," +
        y2 +
        " " +
        (x + Math.cos(rad + 0.35) * (len * 0.45)) +
        "," +
        (y + Math.sin(rad + 0.35) * (len * 0.45)) +
        "\" fill=\"#1a5c34\" />"
      );
    }

    function snowCap(x, y, w) {
      return (
        "<ellipse cx=\"" +
        x +
        "\" cy=\"" +
        y +
        "\" rx=\"" +
        w +
        "\" ry=\"" +
        w * 0.55 +
        "\" fill=\"#f8fcff\" stroke=\"#d4e8f7\" stroke-width=\"0.6\" />"
      );
    }

    function renderBranchArt(season) {
      let caption = "";
      let scene = "";

      if (season === "spring") {
        caption = "Весна: ветка цветущей сакуры.";
        scene =
          "<g class=\"branch-sway\">" +
          "<path d=\"M 16 150 C 90 115, 170 95, 248 78 C 300 66, 350 52, 388 38\" stroke=\"#5c4033\" stroke-width=\"10\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 178 108 C 170 82, 158 58, 148 36\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 238 98 C 230 72, 218 48, 205 28\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 292 86 C 286 64, 278 44, 268 24\" stroke=\"#6b4a3a\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<g class=\"decor-group\">" +
          sakuraFlower(148, 40, 1.05) +
          sakuraFlower(208, 52, 0.9) +
          sakuraFlower(268, 58, 1) +
          sakuraFlower(318, 48, 0.85) +
          sakuraFlower(355, 42, 0.75) +
          sakuraBud(128, 118) +
          sakuraBud(185, 95) +
          sakuraBud(330, 62) +
          "</g>" +
          "</g>";
      } else if (season === "summer") {
        caption = "Лето: ветка черешни с листьями и ягодами.";
        scene =
          "<g class=\"branch-sway\">" +
          "<path d=\"M 14 152 C 95 118, 175 98, 255 82 C 310 72, 360 58, 392 48\" stroke=\"#5a3828\" stroke-width=\"11\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 182 110 C 172 85, 162 62, 152 44\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 248 96 C 240 72, 228 52, 218 34\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 302 84 C 296 64, 288 46, 278 30\" stroke=\"#6b4a3a\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<g class=\"decor-group\">" +
          cherryLeaf(138, 108, -35) +
          cherryLeaf(165, 88, 15) +
          cherryLeaf(200, 72, -55) +
          cherryLeaf(235, 78, 40) +
          cherryLeaf(275, 68, -20) +
          cherryLeaf(310, 62, 25) +
          cherryLeaf(345, 58, -45) +
          cherryPair(158, 52) +
          cherryPair(228, 58) +
          cherryPair(298, 48) +
          cherryPair(352, 44) +
          "</g>" +
          "</g>";
      } else if (season === "autumn") {
        caption = "Осень: кленовая ветка.";
        scene =
          "<g class=\"branch-sway\">" +
          "<path d=\"M 18 148 C 92 118, 168 100, 242 84 C 295 74, 348 60, 386 46\" stroke=\"#5c4033\" stroke-width=\"10\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 176 108 C 168 82, 158 58, 150 40\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 238 96 C 230 72, 220 50, 210 32\" stroke=\"#6b4a3a\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<path d=\"M 290 86 C 284 66, 276 48, 268 30\" stroke=\"#6b4a3a\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\" />" +
          "<g class=\"decor-group\">" +
          mapleLeaf(142, 100, -25, 0.85, "#e85d04") +
          mapleLeaf(178, 78, 40, 0.95, "#d9480f") +
          mapleLeaf(218, 88, -50, 0.9, "#f4a261") +
          mapleLeaf(258, 72, 15, 1, "#c2410c") +
          mapleLeaf(298, 68, -35, 0.88, "#ea580c") +
          mapleLeaf(332, 58, 55, 0.82, "#9a3412") +
          mapleLeaf(365, 52, -15, 0.75, "#f59e0b") +
          "</g>" +
          "</g>";
      } else {
        caption = "Зима: еловая ветка под снегом.";
        scene =
          "<g class=\"branch-sway\">" +
          "<path d=\"M 22 158 C 75 125, 130 95, 185 72 C 240 52, 300 38, 368 28\" stroke=\"#4a3224\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\" />" +
          spruceNeedle(95, 128, -118, 38) +
          spruceNeedle(110, 118, -112, 42) +
          spruceNeedle(145, 102, -108, 44) +
          spruceNeedle(175, 88, -102, 46) +
          spruceNeedle(210, 76, -98, 48) +
          spruceNeedle(248, 64, -95, 50) +
          spruceNeedle(288, 52, -92, 48) +
          spruceNeedle(325, 44, -88, 46) +
          spruceNeedle(355, 36, -85, 42) +
          "<g class=\"decor-group decor-snow\">" +
          snowCap(95, 118, 14) +
          snowCap(145, 95, 15) +
          snowCap(210, 68, 16) +
          snowCap(275, 52, 15) +
          snowCap(335, 38, 14) +
          "<circle cx=\"118\" cy=\"108\" r=\"3\" fill=\"#eef8ff\" opacity=\"0.9\" />" +
          "<circle cx=\"232\" cy=\"70\" r=\"2.5\" fill=\"#eef8ff\" opacity=\"0.85\" />" +
          "<circle cx=\"308\" cy=\"48\" r=\"3\" fill=\"#ffffff\" opacity=\"0.9\" />" +
          "</g>" +
          "</g>";
      }

      seasonBranch.setAttribute(
        "aria-label",
        season === "spring"
          ? "Нарисованная ветка цветущей сакуры"
          : season === "summer"
            ? "Нарисованная ветка черешни с ягодами"
            : season === "autumn"
              ? "Нарисованная кленовая ветка"
              : "Нарисованная еловая ветка в снегу"
      );

      seasonBranch.innerHTML =
        "<defs>" +
        "<linearGradient id=\"skyGrad\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">" +
        "<stop offset=\"0%\" stop-color=\"rgba(255,255,255,0.75)\" />" +
        "<stop offset=\"100%\" stop-color=\"rgba(255,255,255,0.12)\" />" +
        "</linearGradient>" +
        "</defs>" +
        "<rect x=\"0\" y=\"0\" width=\"400\" height=\"180\" fill=\"url(#skyGrad)\"></rect>" +
        scene;
      seasonLabel.textContent = caption;
    }

    function applySeasonTheme() {
      const selected = seasonSelect.value;
      const finalSeason = selected === "auto" ? getSeasonByMonth(today.getMonth()) : selected;
      document.body.dataset.season = finalSeason;
      renderBranchArt(finalSeason);
    }

    async function loadHoliday(country = "RU") {
      const y = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      const localKey = month + "-" + day;

      try {
        const url = "https://date.nager.at/api/v3/PublicHolidays/" + y + "/" + country;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error("Holiday API error");
        }
        const holidays = await res.json();
        const hit = holidays.find((h) => h.date === y + "-" + month + "-" + day);
        if (hit) {
          holidayText.textContent = hit.localName + " (" + country + ")";
          return;
        }
      } catch (e) {
        // Fallback ниже сработает автоматически.
      }

      if (memorableDates[localKey]) {
        holidayText.textContent = memorableDates[localKey];
      } else {
        holidayText.textContent = "Сегодня нет крупного официального праздника. Отличный день для личных достижений.";
      }
    }

    async function geocodeCity(city) {
      const params = new URLSearchParams({
        name: city,
        count: "1",
        language: "ru",
        format: "json"
      });
      const res = await fetch("https://geocoding-api.open-meteo.com/v1/search?" + params.toString());
      if (!res.ok) {
        throw new Error("Не удалось получить координаты города");
      }
      const data = await res.json();
      if (!data.results || data.results.length === 0) {
        throw new Error("Город не найден");
      }
      return data.results[0];
    }

    async function fetchForecast(lat, lon, timezone) {
      const params = new URLSearchParams({
        latitude: String(lat),
        longitude: String(lon),
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max",
        timezone: timezone || "auto",
        forecast_days: "2"
      });
      const res = await fetch("https://api.open-meteo.com/v1/forecast?" + params.toString());
      if (!res.ok) {
        throw new Error("Не удалось получить прогноз погоды");
      }
      return res.json();
    }

    function renderWeather(daily) {
      weatherBox.innerHTML = "";
      for (let i = 0; i < daily.time.length; i += 1) {
        const line = document.createElement("div");
        line.className = "weather-line";
        line.innerHTML =
          "<strong>" + formatISODate(daily.time[i]) + "</strong>" +
          "<span>" + weatherCodeToText(daily.weather_code[i]) + ", " +
          Math.round(daily.temperature_2m_min[i]) + "..." +
          Math.round(daily.temperature_2m_max[i]) + "°C, " +
          "осадки: " + daily.precipitation_sum[i] + " мм, " +
          "ветер: " + daily.windspeed_10m_max[i] + " км/ч</span>";
        weatherBox.appendChild(line);
      }
    }

    function buildCareReminder(daily) {
      const maxToday = Math.round(daily.temperature_2m_max[0]);
      const maxTomorrow = Math.round(daily.temperature_2m_max[1] ?? daily.temperature_2m_max[0]);
      const rainToday = Number(daily.precipitation_sum[0]) || 0;
      const rainTomorrow = Number(daily.precipitation_sum[1]) || 0;
      const windToday = Number(daily.windspeed_10m_max[0]) || 0;
      const codes = [daily.weather_code[0], daily.weather_code[1]];

      const isRainy = rainToday > 1.2 || rainTomorrow > 1.2 || codes.some((code) => [61, 63, 65, 80, 95].includes(code));
      const isWindy = windToday >= 28;
      const isCold = maxToday <= 8;
      const isHot = maxToday >= 27 || maxTomorrow >= 27;

      if (isRainy) {
        return "Сегодня зонт важнее мотивации: и тот, и другой лучше не забывать. Береги ноги сухими и настроение легким.";
      }
      if (isWindy) {
        return "Ветер бодрый: прическа может уйти в свободное плавание. Надень что-то непродуваемое и держись уверенно.";
      }
      if (isCold) {
        return "Прохладно: чай в термосе почти как суперсила. Одевайся слоями и не геройствуй без шапки.";
      }
      if (isHot) {
        return "Почти лето: солнце щедрое, как бабушка на обед. Вода, головной убор и короткие паузы в тени будут кстати.";
      }
      return "Погода дружелюбная: можно идти покорять день без лишней драмы. Возьми воду и сделай маленькую прогулку для настроения.";
    }

    async function updateAll() {
      const city = cityInput.value.trim();
      if (!city) {
        statusEl.textContent = "Введите название города.";
        return;
      }

      statusEl.textContent = "Загружаю данные...";
      weatherBox.innerHTML = "";

      try {
        const geo = await geocodeCity(city);
        const forecast = await fetchForecast(geo.latitude, geo.longitude, geo.timezone);
        cityLabel.textContent = "Город: " + geo.name + (geo.country ? ", " + geo.country : "");
        renderWeather(forecast.daily);
        reminderText.textContent = buildCareReminder(forecast.daily);
        await loadHoliday(geo.country_code || "RU");
        statusEl.textContent = "Данные обновлены.";
      } catch (err) {
        statusEl.textContent = err.message || "Произошла ошибка при загрузке данных.";
        reminderText.textContent = "Не получилось получить прогноз. На всякий случай: возьми воду, легкую куртку и улыбку.";
      }
    }

    loadBtn.addEventListener("click", updateAll);
    seasonSelect.addEventListener("change", applySeasonTheme);
    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        updateAll();
      }
    });

    applySeasonTheme();
    updateAll();
  </script>
</body>
</html>
